<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC 訂單管理系統 - 變更密碼</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="portal-wrapper">
        <!-- 背景動畫元件 -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <main class="portal-main">
            <!-- 左側區塊：品牌展示 -->
            <section class="brand-section">
                <div>
                    <div class="logo-box">
                        <span class="logo-icon">📦</span>
                        <span class="logo-text">RBAC System</span>
                    </div>
                    <h1 class="brand-title">歡迎加入<br>系統管理平台</h1>
                    <p class="brand-subtitle">為了您的帳戶安全，首次登入必須設定新的專屬密碼。</p>
                </div>
                <div class="brand-footer">
                    &copy; 2026 RBAC Order Management System
                </div>
            </section>

            <!-- 右側區塊：變更密碼表單 -->
            <section class="login-section">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>重設密碼</h2>
                        <p>請設定您的新密碼以啟用帳號</p>
                    </div>

                    <form id="changePasswordForm">
                        <div class="form-group">
                            <label for="newPassword">新密碼</label>
                            <input type="password" id="newPassword" placeholder="請輸入新密碼" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">確認新密碼</label>
                            <input type="password" id="confirmPassword" placeholder="請再次輸入新密碼" required minlength="6">
                        </div>

                        <button type="submit" class="btn-login">儲存並登入</button>
                        
                        <div id="errorMessage" class="error-message"></div>
                    </form>

                    <div class="auth-footer">
                        <p class="hint-text">如果遇到問題，請聯繫系統管理員</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { getCurrentUser, clearCurrentUser, getUsers, saveUsers } from './js/data.js';

        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('changePasswordForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const newPassword     = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const errorMessage    = document.getElementById('errorMessage');
                
                errorMessage.textContent = '';
                
                if (newPassword !== confirmPassword) {
                    errorMessage.textContent = '兩次輸入的密碼不一致';
                    return;
                }
                
                if (newPassword.length < 6) {
                    errorMessage.textContent = '密碼長度至少需要 6 個字元';
                    return;
                }

                const users = getUsers();
                const index = users.findIndex(u => u.employeeId === currentUser.employeeId);
                
                if (index > -1) {
                    users[index].password = newPassword;
                    users[index].mustChangePassword = false;
                    saveUsers(users);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    errorMessage.textContent = '找不到使用者資料，請重新登入';
                    setTimeout(() => {
                        clearCurrentUser();
                        window.location.href = 'index.html';
                    }, 2000);
                }
            });
        });
    </script>
</body>
</html>
