<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儀表板 | 訂單管理系統</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        .user-info {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .logout-btn {
            margin-top: 20px;
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="user-info">
            <h1>歡迎回來</h1>
            <p id="welcomeMessage">正在載入...</p>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('welcomeMessage').textContent = 
                `您好，${user.name} (${user.employeeId})，您的角色是：${user.role}`;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
